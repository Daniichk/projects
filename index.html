<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2 ESO Hackathon</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 50px; }
        .container { max-width: 600px; margin: auto; }
        .card { background: #2d2d2d; padding: 20px; margin: 15px 0; border-radius: 15px; border: 1px solid #444; }
        .btn { background: #0070f3; color: white; border: none; padding: 10px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn:hover { background: #0051ad; }
        input { padding: 10px; border-radius: 5px; border: 1px solid #444; background: #333; color: white; width: 80%; margin-bottom: 10px; }
        .prize-pool { color: #00ff00; font-size: 1.5rem; margin-bottom: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 2 ESO Hackathon</h1>
        <div class="prize-pool">Prize Pool: {{ total_paid * 0.8 }}€</div>
        <p>Pay 1€ to Daniil to activate your vote!</p>

        {% for project in projects %}
        <div class="card">
            <h2>{{ project.name }}</h2>
            <p>Votes: <strong>{{ project.votes }}</strong></p>
            <form action="/vote" method="post">
                <input type="hidden" name="project_id" value="{{ project.id }}">
                <input type="email" name="email" placeholder="name.surname@alu.escuelassj.com" required>
                <br>
                <button type="submit" class="btn">Vote</button>
            </form>
        </div>
        {% endfor %}
    </div>
</body>
</html>

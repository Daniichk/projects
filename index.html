<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovation Summit 2024</title>
    <style>
        :root { --bg: #000; --glass: rgba(255, 255, 255, 0.05); --accent: #0071e3; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; }
        header { padding: 80px 20px; text-align: center; background: radial-gradient(circle at center, #111, #000); }
        h1 { font-size: 64px; letter-spacing: -2px; margin: 0; }
        .pool { font-size: 32px; color: #28cd41; margin-top: 20px; font-weight: 700; }
        .container { max-width: 1100px; margin: auto; padding: 40px 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
        .card { background: var(--glass); backdrop-filter: blur(20px); border-radius: 24px; padding: 35px; border: 1px solid #333; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: #555; }
        .tech { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; margin-bottom: 10px; }
        .progress { height: 4px; background: #222; border-radius: 10px; margin: 20px 0; overflow: hidden; }
        .bar { height: 100%; transition: 1s; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff; margin-bottom: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--accent); color: #fff; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <h1>Innovation Summit</h1>
        <div class="pool">Total Prize Fund: {{ total_pool }}€</div>
    </header>
    <div class="container">
        {% for p in projects %}
        <div class="card">
            <div class="tech">{{ p.tech }}</div>
            <h3>{{ p.name }}</h3>
            <p style="color:#888; font-size:14px;">{{ p.desc }}</p>
            <div style="font-size:32px; font-weight:700; margin:15px 0;">{{ p.votes }} <small style="font-size:12px; color:#555;">votes</small></div>
            <div class="progress"><div class="bar" style="width:{{ p.percent }}%; background:{{ p.color }}"></div></div>
            <form action="/vote" method="post">
                <input type="hidden" name="project_id" value="{{ p.id }}">
                <input type="email" name="email" placeholder="school.email@alu..." required>
                <button type="submit" class="btn">Confirm Vote</button>
            </form>
        </div>
        {% endfor %}
    </div>
</body>
</html>
